<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versatus.Net - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 p-8 transform transition-all hover:shadow-2xl">
        <div class="flex flex-col items-center mb-10">
            <div class="w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-800">Versatus.Net</h1>
            <p class="text-slate-500 mt-2">Bem-vindo de volta, Sales Force</p>
        </div>

        <form class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">ID do Tenant</label>
                <input type="text" placeholder="ex: versatus-demo" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none bg-slate-50">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Usuário</label>
                <input type="text" placeholder="seu_usuario" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none bg-slate-50">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Senha</label>
                <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none bg-slate-50">
            </div>
            
            <div class="flex items-center justify-between py-2">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 rounded text-blue-600 border-slate-300 focus:ring-blue-500">
                    <span class="text-sm text-slate-600">Lembrar de mim</span>
                </label>
                <a href="#" class="text-sm font-medium text-blue-600 hover:text-blue-700">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all transform active:scale-[0.98]">
                Entrar no Sistema
            </button>
        </form>

        <p class="text-center text-slate-400 text-xs mt-10">Versatus.Net Desktop Migration v2.0</p>
    </div>
</body>
</html>
