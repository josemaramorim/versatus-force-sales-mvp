name: CD

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Release context
        run: |
          echo "Preparing release for ref: $GITHUB_REF"
          echo "Define deploy steps after infra is finalized"

  deploy-dev:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs: prepare-release
    environment: dev
    steps:
      - name: Deploy placeholder
        run: echo "Deploy para DEV sera implementado na fase de infraestrutura."

  deploy-prod:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    needs: prepare-release
    environment: prod
    steps:
      - name: Deploy placeholder
        run: echo "Deploy para PROD sera implementado apos validacao do MVP em HML."
