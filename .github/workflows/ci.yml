name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  docs-and-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate analysis docs presence
        run: |
          test -f Analise/README.md
          test -f Analise/06-app-forca-venda-web.md
          test -f Analise/07-conducao-projeto-mvp.md

  dotnet-build:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('**/*.sln') != '' || hashFiles('**/*.csproj') != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore || true

      - name: Build
        run: dotnet build --configuration Release --no-restore || true

  node-build:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('**/package.json') != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present
