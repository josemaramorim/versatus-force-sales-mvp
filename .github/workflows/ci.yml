name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  docs-and-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate analysis docs presence
        run: |
          test -f Analise/README.md
          test -f Analise/06-app-forca-venda-web.md
          test -f Analise/07-conducao-projeto-mvp.md

  dotnet-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect .NET projects
        id: detect-dotnet
        shell: bash
        run: |
          if find . \( -name "*.sln" -o -name "*.slnx" -o -name "*.csproj" \) | grep -q .; then
            echo "has_dotnet=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dotnet=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.detect-dotnet.outputs.has_dotnet == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        if: steps.detect-dotnet.outputs.has_dotnet == 'true'
        run: dotnet restore || true

      - name: Build
        if: steps.detect-dotnet.outputs.has_dotnet == 'true'
        run: dotnet build --configuration Release --no-restore || true

      - name: Skip .NET build
        if: steps.detect-dotnet.outputs.has_dotnet != 'true'
        run: echo "No .NET project found; skipping dotnet-build job steps."

  node-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Node project
        id: detect-node
        shell: bash
        run: |
          if find . -name "package.json" -not -path "*/node_modules/*" | grep -q .; then
            echo "has_node=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_node=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.detect-node.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        if: steps.detect-node.outputs.has_node == 'true'
        run: npm ci || npm install

      - name: Build
        if: steps.detect-node.outputs.has_node == 'true'
        run: npm run build --if-present

      - name: Test
        if: steps.detect-node.outputs.has_node == 'true'
        run: npm test --if-present

      - name: Skip Node build
        if: steps.detect-node.outputs.has_node != 'true'
        run: echo "No package.json found; skipping node-build job steps."

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [dotnet-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start docker-compose services
        run: |
          docker compose up -d

      - name: Wait for services to become healthy
        shell: bash
        run: |
          services=(fvs-postgres fvs-redis fvs-rabbitmq)
          for svc in "${services[@]}"; do
            echo "Waiting for $svc to be healthy..."
            for i in {1..60}; do
              status=$(docker inspect --format='{{.State.Health.Status}}' "$svc" 2>/dev/null || echo "starting")
              status=${status//\"/}
              if [[ "$status" == "healthy" ]]; then
                echo "$svc is healthy"
                break
              fi
              sleep 2
            done
          done

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run integration tests
        run: |
          dotnet test src/backend/Versatus.ForcaVendas.Api.Tests -c Release --no-build --verbosity normal

      - name: Tear down docker-compose
        if: always()
        run: docker compose down -v
